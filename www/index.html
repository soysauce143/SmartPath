<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SmartPath Pro</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="app-container">
        <header>
            <h1>SmartPath Pro</h1>
            <div id="status" class="status-indicator">Status: Disconnected</div>
        </header>

        <section class="pairing-section">
            <button id="connectBtn" class="main-button" onclick="connect()">Pair Hardware</button>
        </section>

        <section class="control-grid">
            <!-- ontouchstart triggers movement; ontouchend triggers Stop ('S') -->
            <button class="dir-btn up" ontouchstart="sendCmd('F')" ontouchend="sendCmd('S')">▲</button>
            <div class="middle-row">
                <button class="dir-btn left" ontouchstart="sendCmd('L')" ontouchend="sendCmd('S')">◀</button>
                <button class="dir-btn stop" onclick="sendCmd('S')">■</button>
                <button class="dir-btn right" ontouchstart="sendCmd('R')" ontouchend="sendCmd('S')">▶</button>
            </div>
            <button class="dir-btn down" ontouchstart="sendCmd('B')" ontouchend="sendCmd('S')">▼</button>
        </section>
    </div>

    <!-- Script must be type="module" for Capacitor -->
    <script type="module" src="app.js"></script>
</body>
</html>
